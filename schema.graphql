type AgentMapping {
	agentId: String!
	toolUseId: String!
}

type AssistantEvent implements Event & CoreEvent {
	agentId: String
	apiError: JSON
	children: [Event!]!
	cwd: String!
	error: JSON
	gitBranch: String
	isApiErrorMessage: Boolean
	isSidechain: Boolean!
	message: JSON!
	parent: Event
	parentUuid: String
	raw: JSON!
	requestId: String
	sessionId: String!
	slug: String
	timestamp: String!
	type: String!
	userType: String!
	uuid: String!
	version: String!
}

interface CoreEvent {
	children: [Event!]!
	cwd: String!
	gitBranch: String
	isSidechain: Boolean!
	parent: Event
	parentUuid: String
	sessionId: String!
	slug: String
	timestamp: String!
	userType: String!
	uuid: String!
	version: String!
}

"""
Implement the DateTime<Utc> scalar

The input/output is a string in RFC3339 format.
"""
scalar DateTime

interface Event {
	apiError: JSON
	error: JSON
	isApiErrorMessage: Boolean
	raw: JSON!
	type: String!
}

type FileHistoryEvent implements Event {
	apiError: JSON
	error: JSON
	isApiErrorMessage: Boolean
	isSnapshotUpdate: Boolean!
	messageId: String!
	raw: JSON!
	snapshot: JSON!
	type: String!
}

"""
A scalar that can represent any JSON value.
"""
scalar JSON

input PageInput {
	limit: Int! = 0
	offset: Int! = 0
}

type ProgressEvent implements Event & CoreEvent {
	agentId: String
	apiError: JSON
	children: [Event!]!
	cwd: String!
	data: JSON
	error: JSON
	gitBranch: String
	isApiErrorMessage: Boolean
	isSidechain: Boolean!
	parent: Event
	parentToolUseID: String
	parentUuid: String
	raw: JSON!
	sessionId: String!
	slug: String
	timestamp: String!
	toolUseID: String
	type: String!
	userType: String!
	uuid: String!
	version: String!
}

type Query {
	"""
	Load a session by ID.
	"""
	session(id: String!): Session
	"""
	List discovered sessions, optionally filtered by project name and paginated.
	"""
	sessions(page: PageInput, project: String): SessionsResult!
}

type QueueOperationEvent implements Event {
	apiError: JSON
	content: String
	error: JSON
	isApiErrorMessage: Boolean
	operation: String!
	raw: JSON!
	sessionId: String!
	timestamp: String!
	type: String!
}

type Session {
	"""
	Mapping from tool_use_id to agent_id for subagent calls.
	"""
	agentMap: [AgentMapping!]!
	"""
	Load session events, optionally paginated.
	"""
	events(page: PageInput): SessionEventsData!
	meta: SessionMeta!
	"""
	The raw JSONL content of the session file.
	"""
	rawLog: String!
}

type SessionEventsData {
	events: [Event!]!
	total: Int!
}

type SessionMeta {
	agentId: String
	createdAt: DateTime
	"""
	Absolute path to the session's .jsonl file on disk.
	"""
	filePath: String
	firstMessage: String
	id: String!
	isSidechain: Boolean!
	messageCount: Int!
	parentSessionId: String
	project: String!
	projectPath: String
	slug: String
	updatedAt: DateTime
}

type SessionsResult {
	sessions: [Session!]!
	total: Int!
}

type SubscriptionRoot {
	"""
	Watch a session's log file and emit new events as they are appended.
	"""
	sessionEvents(id: String!): Event!
}

type SystemEvent implements Event & CoreEvent {
	apiError: JSON
	cause: JSON
	children: [Event!]!
	compactMetadata: JSON
	content: String
	cwd: String!
	durationMs: Int
	error: JSON
	gitBranch: String
	isApiErrorMessage: Boolean
	isMeta: Boolean
	isSidechain: Boolean!
	level: String
	logicalParentUuid: String
	maxRetries: Int
	parent: Event
	parentUuid: String
	raw: JSON!
	retryAttempt: Int
	retryInMs: Int
	sessionId: String!
	slug: String
	subtype: String
	timestamp: String!
	type: String!
	url: String
	userType: String!
	uuid: String!
	version: String!
}

type UnknownEvent implements Event {
	apiError: JSON
	error: JSON
	isApiErrorMessage: Boolean
	raw: JSON!
	type: String!
}

type UserEvent implements Event & CoreEvent {
	agentId: String
	apiError: JSON
	children: [Event!]!
	cwd: String!
	error: JSON
	gitBranch: String
	imagePasteIds: [String!]
	isApiErrorMessage: Boolean
	isCompactSummary: Boolean
	isMeta: Boolean
	isSidechain: Boolean!
	isVisibleInTranscriptOnly: Boolean
	message: JSON!
	parent: Event
	parentUuid: String
	permissionMode: String
	planContent: String
	raw: JSON!
	sessionId: String!
	slug: String
	sourceToolAssistantUUID: String
	thinkingMetadata: JSON
	timestamp: String!
	todos: [JSON!]
	toolUseResult: JSON
	type: String!
	userType: String!
	uuid: String!
	version: String!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Provides a scalar specification URL for specifying the behavior of custom scalar types.
"""
directive @specifiedBy(url: String!) on SCALAR
schema {
	query: Query
	subscription: SubscriptionRoot
}
