query Sessions {
  sessions {
    sessions {
      meta { id project slug createdAt updatedAt messageCount firstMessage projectPath }
    }
    total
  }
}

query Session($id: String!) {
  session(id: $id) {
    meta { id isSidechain parentSessionId agentId firstMessage }
    events { events { raw } total }
    agentMap { toolUseId agentId }
  }
}

subscription SessionEvents($id: String!) {
  sessionEvents(id: $id) { raw }
}

query SessionPage($id: String!, $page: PageInput) {
  session(id: $id) {
    meta { id filePath }
    events(page: $page) { events { raw } total }
  }
}

query SessionMeta($id: String!) {
  session(id: $id) { meta { id filePath } }
}

query RawLog($id: String!) {
  session(id: $id) { rawLog }
}
